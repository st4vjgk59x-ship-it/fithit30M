<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitHit30M</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 80%; }
        h1 { color: #4A90E2; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #4A90E2; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FitHit30M 🚀</h1>
        <p>Kezdd el a 30 napos kihívást!</p>
        <input type="text" placeholder="Neved">
        <input type="number" placeholder="Súlyod (kg)">
        <button onclick="alert('Szuper! Kezdhetjük az edzést?')">Program Indítása</button>
    </div>
</body>
</html>
