<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FitHit30M - 30 napos fitness program">
    <meta name="theme-color" content="#4A90E2">
    <title>FitHit30M - 30 Napos Fitness Program</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js" defer></script>
    <!-- Fallback for Chart.js -->
    <script>
        if (!window.Chart) {
            console.warn('Chart.js failed to load from CDN. Loading from backup...');
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js';
            document.head.appendChild(script);
        }
    </script>
</head>
<body>
    <main>
        <!-- Registration Screen -->
        <section id="auth-screen" class="card auth-container" role="region" aria-label="Regisztrációs képernyő">
            <h1>FitHit30M 🚀</h1>
            <p class="subtitle">30 napos fitness challenge</p>
            
            <form id="registration-form" novalidate>
                <div class="form-group">
                    <label for="name">Neved *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name"
                        placeholder="Írd be a neved"
                        required
                        aria-required="true"
                        aria-describedby="name-error"
                    >
                    <span id="name-error" class="error-message" role="alert"></span>
                </div>

                <div class="form-group">
                    <label for="weight">Súlyod (kg) *</label>
                    <input 
                        type="number" 
                        id="weight" 
                        name="weight"
                        placeholder="pl. 75"
                        min="20"
                        max="300"
                        required
                        aria-required="true"
                        aria-describedby="weight-error"
                    >
                    <span id="weight-error" class="error-message" role="alert"></span>
                </div>

                <button type="submit" class="btn btn-primary" id="start-btn">
                    <span class="btn-text">Indítás!</span>
                    <span class="loading-spinner" id="loading-spinner" hidden aria-hidden="true"></span>
                </button>
            </form>

            <p class="form-hint">* Kötelező mezők</p>
        </section>

        <!-- Main Application -->
        <section id="main-app" class="main-app" hidden role="region" aria-label="Főalkalmazás">
            <!-- Day Display Header -->
            <header class="card card-header" role="banner">
                <h1 id="day-display">Nap 1 / 30</h1>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
                <p id="user-greeting" class="user-greeting"></p>
            </header>

            <!-- Workout Card -->
            <article class="card workout-card">
                <h2>🏋️ Mai Edzés</h2>
                <div id="workout" class="workout-content" role="main"></div>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="next-day-btn" onclick="app.nextDay()">
                        Nap Kész ✅
                    </button>
                    <button class="btn btn-secondary" id="reset-btn" onclick="app.reset()">
                        Újrakezdés
                    </button>
                </div>
            </article>

            <!-- Progress Summary -->
            <article class="card stats-card">
                <h3>📊 Haladás</h3>
                <div class="stats-grid">
                    <div class="stat">
                        <span class="stat-value" id="completed-days">0</span>
                        <span class="stat-label">Nap befejezve</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="remaining-days">30</span>
                        <span class="stat-label">Nap hátra</span>
                    </div>
                </div>
            </article>

            <!-- Sports News Card -->
            <article class="card news-card" aria-label="Napi sporthírek">
                <h3>📰 Napi Sporthírek</h3>
                <div id="news-list" class="news-list" role="list" aria-live="polite" aria-busy="true">
                    <div class="news-loading">
                        <span class="loading-spinner news-spinner" aria-hidden="true"></span>
                        <span>Hírek betöltése...</span>
                    </div>
                </div>
                <button class="btn btn-outline news-refresh-btn" onclick="app.refreshNews()">
                    🔄 Frissítés
                </button>
            </article>

            <!-- User Info Footer -->
            <footer class="card user-info-card">
                <div class="user-info">
                    <p><strong>Felhasználó:</strong> <span id="display-name"></span></p>
                    <p><strong>Kezdeti súly:</strong> <span id="display-weight"></span> kg</p>
                </div>
                <button class="btn btn-outline" id="logout-btn" onclick="app.logout()">
                    Kijelentkezés
                </button>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
