<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitHit30M</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #4A90E2; --bg: #F8FAFC; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; background: var(--p); color: white; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        #main-app { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="card">
    <h2>FitHit30M Regisztráció 🚀</h2>
    <input type="text" id="name" placeholder="Neved">
    <input type="number" id="weight" placeholder="Súlyod (kg)">
    <button class="btn" onclick="start()">Indítás!</button>
</div>

<div id="main-app">
    <div class="card" style="background: var(--p); color: white; text-align: center;">
        <h1 id="day-display">Nap 1</h1>
    </div>
    <div class="card">
        <h3>🏋️ Mai Edzés</h3>
        <p id="workout"></p>
        <button class="btn" onclick="nextDay()">Nap Kész ✅</button>
    </div>
</div>

<script>
    const program = [
        "20p HIIT: 30mp guggolás, 30mp pihenő (10x)",
        "30p Intenzív séta + 5p nyújtás",
        "15p Hasizom: Plank és Felülés",
        "Pihenőnap! Sétálj egy nagyot.",
        "25p Erősítés: Fekvőtámasz és Kitörés"
    ];

    function start() {
        const n = document.getElementById('name').value;
        const w = document.getElementById('weight').value;
        if(!n || !w) return alert("Kérlek töltsd ki!");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        updateUI();
    }

    let currentDay = 1;
    function updateUI() {
        document.getElementById('day-display').innerText = "Nap " + currentDay + " / 30";
        document.getElementById('workout').innerText = program[(currentDay-1) % program.length];
    }

    function nextDay() {
        currentDay++;
        updateUI();
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
