<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitHit30M</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #4A90E2; --s: #50E3C2; --bg: #F8FAFC; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        #main-app { display: none; }
        h1, h2 { color: #1E293B; }
    </style>
</head>
<body>

<div id="auth-screen" class="card">
    <h2>FitHit30M Regisztráció</h2>
    <input type="text" id="name" placeholder="Neved">
    <input type="number" id="weight" placeholder="Súlyod (kg)">
    <button class="btn btn-p" onclick="start()">Program Indítása 🚀</button>
</div>

<div id="main-app">
    <div class="card" style="background: var(--p); color: white; text-align: center;">
        <h1 id="day-display">Nap 1 / 30</h1>
    </div>
    <div class="card">
        <h3>🏋️ Mai Edzés</h3>
        <p id="workout">Betöltés...</p>
        <button class="btn btn-p" onclick="nextDay()">Nap Kész ✅</button>
    </div>
    <div class="card">
        <h3>📊 Súlyod alakulása</h3>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
    const program = [
        { w: "20p HIIT (Guggolás, Plank)", f: "Zabkása" },
        { w: "30p Séta + Nyújtás", f: "Csirke rizzsel" },
        { w: "15p Hasizom edzés", f: "Saláta" }
    ];

    let data = JSON.parse(localStorage.getItem('fithit_data')) || null;

    function start() {
        const n = document.getElementById('name').value;
        const w = document.getElementById('weight').value;
        if(!n || !w) return alert("Töltsd ki!");
        data = { name: n, weightHistory: [w], day: 1 };
        save();
    }

    function nextDay() {
        data.day++;
        save();
    }

    function save() {
        localStorage.setItem('fithit_data', JSON.stringify(data));
        location.reload();
    }

    if(data) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('day-display').innerText = "Nap " + data.day + " / 30";
        document.getElementById('workout').innerText = program[(data.day-1)%3].w;
        new Chart(document.getElementById('chart'), {
            type: 'line',
            data: { labels: data.weightHistory.map((_,i)=>i+1), datasets: [{label:'kg', data:data.weightHistory, borderColor:'#4A90E2'}]}
        });
    }
</script>
</body>
</html>
